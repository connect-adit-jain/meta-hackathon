id: medium_005
title: "Fix Dictionary Default Value Bug"
description: "The word counter uses assignment instead of increment, losing previous counts."
buggy_code: |
  def word_count(text):
      counts = {}
      for word in text.split():
          word = word.lower()
          if word in counts:
              counts[word] = 1
          else:
              counts[word] = 1
      return counts
error_message: "Wrong output: word_count('the cat and the dog') returns {'the': 1, ...} instead of {'the': 2, ...}"
expected_output: "word_count('the cat and the dog') should return {'the': 2, 'cat': 1, 'and': 1, 'dog': 1}"
test_cases:
  - input: "word_count('a b a')['a']"
    expected: "2"
  - input: "word_count('hello hello hello')['hello']"
    expected: "3"
  - input: "len(word_count('x y z'))"
    expected: "3"
correct_solution: |
  def word_count(text):
      counts = {}
      for word in text.split():
          word = word.lower()
          if word in counts:
              counts[word] += 1
          else:
              counts[word] = 1
      return counts
hints:
  - "Look at what happens when a word is already in the dictionary"
  - "= 1 resets the count instead of incrementing"
