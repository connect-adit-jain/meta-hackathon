id: medium_003
title: "Fix Swapped FizzBuzz Labels"
description: "The fizzbuzz function swaps Fizz and Buzz labels for multiples of 3 and 5."
buggy_code: |
  def fizzbuzz(n):
      result = []
      for i in range(1, n + 1):
          if i % 3 == 0 and i % 5 == 0:
              result.append("FizzBuzz")
          elif i % 5 == 0:
              result.append("Fizz")
          elif i % 3 == 0:
              result.append("Buzz")
          else:
              result.append(str(i))
      return result
error_message: "Wrong output: fizzbuzz(5)[2] returns 'Buzz' instead of 'Fizz'"
expected_output: "fizzbuzz(15)[2] should be 'Fizz', fizzbuzz(15)[4] should be 'Buzz'"
test_cases:
  - input: "fizzbuzz(15)[2]"
    expected: "Fizz"
  - input: "fizzbuzz(15)[4]"
    expected: "Buzz"
  - input: "fizzbuzz(15)[14]"
    expected: "FizzBuzz"
correct_solution: |
  def fizzbuzz(n):
      result = []
      for i in range(1, n + 1):
          if i % 3 == 0 and i % 5 == 0:
              result.append("FizzBuzz")
          elif i % 3 == 0:
              result.append("Fizz")
          elif i % 5 == 0:
              result.append("Buzz")
          else:
              result.append(str(i))
      return result
hints:
  - "Fizz is for multiples of 3, Buzz is for multiples of 5"
  - "Check the elif order"
