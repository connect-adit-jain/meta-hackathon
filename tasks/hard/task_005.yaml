id: hard_005
title: "Fix Broken Memoised Fibonacci"
description: >
  The fibonacci function has a wrong base case, incorrect memoisation lookup,
  and a tuple-order bug in the recursive return, requiring multi-line reasoning.
buggy_code: |
  def fibonacci(n, memo={}):
      if n <= 0:
          return 1
      if n in memo:
          return memo[n]
      if n == 1:
          return 1
      result = fibonacci(n - 1, memo) + fibonacci(n - 3, memo)
      memo[n] = result
      return result
error_message: "Wrong output: fibonacci(0) returns 1 instead of 0; fibonacci(6) returns wrong value due to n-3 recursion"
expected_output: "fibonacci(0) → 0, fibonacci(6) → 8, fibonacci(10) → 55"
test_cases:
  - input: "fibonacci(0, {})"
    expected: "0"
  - input: "fibonacci(1, {})"
    expected: "1"
  - input: "fibonacci(6, {})"
    expected: "8"
  - input: "fibonacci(10, {})"
    expected: "55"
correct_solution: |
  def fibonacci(n, memo={}):
      if n <= 0:
          return 0
      if n in memo:
          return memo[n]
      if n == 1:
          return 1
      result = fibonacci(n - 1, memo) + fibonacci(n - 2, memo)
      memo[n] = result
      return result
hints:
  - "fibonacci(0) should return 0, not 1"
  - "The recursive call uses n-3 instead of n-2"
