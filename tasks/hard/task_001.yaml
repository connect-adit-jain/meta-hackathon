id: hard_001
title: "Fix Multi-Bug Prime Counter"
description: >
  Two interacting functions — is_prime has inverted return values,
  and count_primes has an off-by-one boundary. Requires reasoning
  across both functions.
buggy_code: |
  def is_prime(n):
      if n < 2:
          return False
      for i in range(2, n):
          if n % i == 0:
              return True
      return False

  def count_primes(limit):
      count = 0
      for i in range(2, limit):
          if is_prime(i):
              count += 1
      return count
error_message: "Wrong output: is_prime(7) returns False, is_prime(4) returns True, count_primes(10) returns 6 instead of 4"
expected_output: "is_prime(7) → True, is_prime(4) → False, count_primes(10) → 4"
test_cases:
  - input: "is_prime(7)"
    expected: "True"
  - input: "is_prime(4)"
    expected: "False"
  - input: "count_primes(10)"
    expected: "4"
  - input: "count_primes(20)"
    expected: "8"
correct_solution: |
  def is_prime(n):
      if n < 2:
          return False
      for i in range(2, n):
          if n % i == 0:
              return False
      return True

  def count_primes(limit):
      count = 0
      for i in range(2, limit + 1):
          if is_prime(i):
              count += 1
      return count
hints:
  - "Check what is_prime returns when it FINDS a divisor"
  - "count_primes range may exclude the limit itself"
