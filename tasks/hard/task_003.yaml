id: hard_003
title: "Fix Matrix Transpose"
description: >
  The transpose function creates the result matrix with wrong dimensions,
  causing an IndexError when transposing non-square matrices.
buggy_code: |
  def transpose(matrix):
      rows = len(matrix)
      cols = len(matrix[0])
      result = [[0] * cols for _ in range(rows)]
      for i in range(rows):
          for j in range(cols):
              result[j][i] = matrix[i][j]
      return result
error_message: "IndexError: list index out of range when transposing [[1,2,3],[4,5,6]]"
expected_output: "transpose([[1,2,3],[4,5,6]]) → [[1,4],[2,5],[3,6]]"
test_cases:
  - input: "transpose([[1, 2, 3], [4, 5, 6]])"
    expected: "[[1, 4], [2, 5], [3, 6]]"
  - input: "transpose([[1, 2], [3, 4]])"
    expected: "[[1, 3], [2, 4]]"
  - input: "transpose([[1], [2], [3]])"
    expected: "[[1, 2, 3]]"
correct_solution: |
  def transpose(matrix):
      rows = len(matrix)
      cols = len(matrix[0])
      result = [[0] * rows for _ in range(cols)]
      for i in range(rows):
          for j in range(cols):
              result[j][i] = matrix[i][j]
      return result
hints:
  - "A transposed MxN matrix should be NxM"
  - "Check the dimensions of the result matrix"
