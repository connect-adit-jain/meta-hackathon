id: easy_004
title: "Fix Indentation Error"
description: "The function body is not indented, causing an IndentationError."
buggy_code: |
  def square(n):
  return n * n
error_message: "IndentationError: expected an indented block after function definition on line 1"
expected_output: "square(5) should return 25"
test_cases:
  - input: "square(5)"
    expected: "25"
  - input: "square(0)"
    expected: "0"
  - input: "square(-3)"
    expected: "9"
correct_solution: |
  def square(n):
      return n * n
hints:
  - "Python uses indentation to define code blocks"
  - "The return statement must be inside the function body"
