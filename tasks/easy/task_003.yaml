id: easy_003
title: "Fix Unclosed Parenthesis"
description: "The multiply function has an unclosed parenthesis in the return statement."
buggy_code: |
  def multiply(a, b):
      return (a * b
error_message: "SyntaxError: unexpected EOF while parsing (line 2)"
expected_output: "multiply(3, 4) should return 12"
test_cases:
  - input: "multiply(3, 4)"
    expected: "12"
  - input: "multiply(0, 5)"
    expected: "0"
  - input: "multiply(-2, 3)"
    expected: "-6"
correct_solution: |
  def multiply(a, b):
      return (a * b)
hints:
  - "Count the parentheses in the return statement"
  - "Every opening parenthesis needs a closing one"
