name: code-debug-fix
version: "1.0.0"
description: >
  An OpenEnv environment where an AI agent debugs and fixes buggy Python code.
  The agent observes buggy code, error messages, and expected outputs, then
  iteratively analyses, suggests fixes, runs tests, and submits solutions.

author: "Scaler Meta"
license: "MIT"

environment:
  module: env.environment
  class: CodeDebugEnv
  max_steps: 10

observation_space:
  type: dict
  fields:
    buggy_code: string
    error_message: string
    expected_output: string
    current_code_state: string
    step_count: integer
    max_steps: integer
    test_results: "list[dict] | null"
    task_id: string
    difficulty: string

action_space:
  type: enum
  actions:
    - name: analyze_code
      description: "Analyse the buggy code to identify issues (+0.2 reward, once)"
    - name: suggest_fix
      description: "Submit corrected code as payload (+1.0 all pass, ∝partial, -0.2 fail)"
    - name: run_tests
      description: "Execute test cases against the current code state (+0.1)"
    - name: submit_solution
      description: "Submit final solution for grading (+5.0 correct, -1.0 incorrect)"

reward_range: [-1.0, 5.0]

reward_rules:
  - "+0.2 for meaningful analysis (first time only)"
  - "+1.0 for a fix that passes all tests"
  - "+0.2–0.8 proportional partial-fix reward"
  - "-0.2 for irrelevant, repeated, or failing actions"
  - "+5.0 for correct final submission"
  - "-1.0 for incorrect final submission"

grader:
  module: grader.grader
  class: Grader
  score_range: [0.0, 1.0]
  deterministic: true
  criteria:
    correctness_weight: 0.60
    efficiency_weight: 0.20
    quality_weight: 0.20

tasks:
  directory: tasks/
  difficulties:
    - name: easy
      count: 5
      description: "Simple syntax errors (missing operators, colons, parentheses, indentation, quotes)"
    - name: medium
      count: 5
      description: "Logical bugs (off-by-one, wrong comparisons, swapped labels, wrong operators, assignment vs increment)"
    - name: hard
      count: 5
      description: "Multi-step bugs across multiple functions/lines (inverted logic, wrong recursion, dimension errors, binary search bugs)"

deployment:
  server: server.py
  port: 7860
  framework: fastapi
  dockerfile: Dockerfile
  compatible_with:
    - "Hugging Face Spaces"

validation:
  script: validate.py
  tests: tests/
